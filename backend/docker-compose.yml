services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: bazaar
      POSTGRES_PASSWORD: bazaar
      POSTGRES_DB: bazaar
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: bazaar
      MINIO_ROOT_PASSWORD: bazaar123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  celery:
    build:
      context: .
      dockerfile: Dockerfile.celery
    environment:
      DATABASE_URL: postgresql+asyncpg://bazaar:bazaar@postgres/bazaar
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-key-change-in-production
      AWS_ACCESS_KEY_ID: bazaar
      AWS_SECRET_ACCESS_KEY: bazaar123
      AWS_S3_BUCKET: bazaar
      AWS_S3_ENDPOINT_URL: http://minio:9000
    depends_on:
      - postgres
      - redis
      - minio

volumes:
  postgres_data:
  minio_data:
